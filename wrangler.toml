name = "la-corsa-invisibile"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Dominio corto del gioco: `custom_domain = true` fa creare a Cloudflare il
# record DNS e il certificato per corsa.roomzero.online (zona roomzero.online,
# stesso account del Worker). Il codice non nomina mai un dominio — link della
# stanza, WebSocket e materiali si costruiscono dall'indirizzo della pagina —
# quindi qui non serve altro.
#
# `workers_dev = true` è esplicito DI PROPOSITO: dichiarando una rotta senza
# indicarlo, il sottodominio la-corsa-invisibile.roomzero.workers.dev può venire
# disattivato. Va tenuto attivo perché i link delle stanze già distribuiti lo
# usano, e perché Sim A (test/playtest-zero/sim-a-funzionale.mjs) ci gioca
# contro in produzione con l'indirizzo scritto a mano.
workers_dev = true
routes = [
  { pattern = "corsa.roomzero.online", custom_domain = true }
]

# Contenuto narrativo del Cronista (src/lib/narratore-corsa-invisibile.md e
# simili): i Worker non hanno accesso al filesystem a runtime, quindi questi
# file .md vengono incorporati come stringa direttamente nel bundle in fase
# di build/deploy (`import testo from "./file.md"` diventa una costante
# stringa) invece di essere letti da disco quando gira il Worker.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

# File statici (l'interfaccia di gioco): tutto ciò che è dentro public/ viene
# servito automaticamente. Le richieste che NON corrispondono a un file lì
# dentro (es. /api/config, /admin/genera-codici) arrivano comunque al Worker.
[assets]
directory = "./public"
binding = "ASSETS"

[[durable_objects.bindings]]
name = "GAME_SESSION"
class_name = "GameSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameSession"]

[[d1_databases]]
database_name = "la-corsa-invisibile-db"
database_id = "03de6415-c215-4a15-bb58-61a1262a550c"
binding = "DB"

# Variabili non segrete
[vars]
GAME_ID = "la_corsa_invisibile"

# Segreti (NON qui): impostali con `wrangler secret put ADMIN_PASSWORD` ecc.
# Nessun valore reale va mai scritto in questo file o versionato nel repo.
